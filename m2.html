<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>M2 Validation Design — wireframe flip-through</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#11121A; --paper:#FAFAF7; --blue:#0B5FB0;
    --blu:#0B5FB0; --blu-bright:#1E9BFE;
    --red:#C2342B; --red-bright:#FF6B6B;
    --mute:#8A8A90; --mute2:#5C5C62;
    --sans:"Plus Jakarta Sans", system-ui, sans-serif;
    --mono:"Menlo", ui-monospace, "SF Mono", monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:#2a2b30;color:#111;font-family:var(--sans);-webkit-text-size-adjust:100%}
  header.bar{
    position:sticky;top:0;z-index:10;background:#1b1c20;color:#e7e7ea;
    display:flex;align-items:center;gap:.6rem;padding:.55rem .8rem;
    font:600 13px/1 var(--mono);border-bottom:1px solid #000;
  }
  header.bar .title{flex:1;letter-spacing:.04em}
  header.bar .count{color:var(--blu-bright)}
  header.bar button{
    font:600 12px/1 var(--mono);color:#e7e7ea;background:#34353b;
    border:1px solid #4a4b52;border-radius:6px;padding:.42rem .6rem;cursor:pointer;
  }
  header.bar button.on{background:var(--blu);border-color:var(--blu);color:#fff}
  .hint{color:#9a9aa2;font:400 11px/1.4 var(--mono);padding:.5rem .8rem;text-align:center}

  main{padding:.7rem clamp(.4rem,2vw,1rem) 3rem}
  .frame{
    width:100%;max-width:760px;margin:0 auto 1rem;aspect-ratio:16/9;
    border-radius:10px;overflow:hidden;position:relative;
    box-shadow:0 2px 14px rgba(0,0,0,.45);
    display:flex;flex-direction:column;padding:clamp(.6rem,2.4vw,1.15rem);
    container-type:inline-size;
  }
  .frame.ink{background:var(--ink);color:var(--paper)}
  .frame.paper{background:var(--paper);color:var(--ink)}
  .frame.blue{background:var(--blue);color:var(--paper)}

  .f-top{display:flex;align-items:flex-start;justify-content:space-between;gap:.5rem}
  .f-num{font:800 clamp(13px,3.4cqw,20px)/1 var(--mono);opacity:.85}
  .f-arch{font:600 clamp(9px,2.5cqw,13px)/1.2 var(--mono);text-align:right;opacity:.55;max-width:55%}
  .badge{display:inline-block;font:800 clamp(8px,2.2cqw,11px)/1 var(--mono);padding:.32em .5em;border-radius:5px;letter-spacing:.05em;vertical-align:middle}
  .badge.do{background:var(--blu-bright);color:#03243f}
  .badge.prop{background:transparent;border:1.5px dashed currentColor;opacity:.85}
  .frame.paper .badge.do{background:var(--blu);color:#fff}

  .f-focal{margin:.5cqw 0 .2rem;font:800 clamp(15px,4.6cqw,30px)/1.12 var(--sans);letter-spacing:-.01em;max-width:24ch}
  .f-body{flex:1;display:flex;flex-direction:column;justify-content:center;gap:.5cqw}

  .copyslot{border:1.5px dashed currentColor;opacity:.5;border-radius:6px;padding:.5em .7em;font:600 clamp(9px,2.4cqw,12px)/1 var(--mono);letter-spacing:.04em}
  .diagram{border:2px solid var(--ax);border-radius:7px;padding:.6em .75em;color:inherit}
  .diagram .dtype{font:800 clamp(9px,2.5cqw,12px)/1.1 var(--mono);color:var(--ax);letter-spacing:.05em;text-transform:uppercase}
  .diagram .dlabels{margin-top:.3em;font:400 clamp(10px,2.7cqw,13px)/1.3 var(--sans);opacity:.92}

  .f-foot{display:flex;justify-content:space-between;align-items:center;gap:.5rem;font:600 clamp(8px,2.1cqw,11px)/1 var(--mono);opacity:.6;margin-top:.4rem}
  .dot{display:inline-block;width:.7em;height:.7em;border-radius:50%;vertical-align:-1px;margin-right:.3em}

  body.step main{padding-top:1.2rem;min-height:70vh}
  body.step .frame{display:none}
  body.step .frame.current{display:flex}
  @media (max-width:520px){ .f-focal{max-width:20ch} }
</style>
</head>
<body class="scroll">
<header class="bar">
  <span class="title">M2 · VALIDATION DESIGN</span>
  <span class="count" id="count">15 frames</span>
  <button id="mode">scroll</button>
</header>
<div class="hint" id="hint">135-min session · scroll all 15 · tap “scroll” to step (arrows / swipe)</div>
<main id="deck"></main>

<script>
// market accent BLUE: deep on paper, bright on ink; white on the blue plate (blue-on-blue is invisible, and blue plates use ink/white only)
const A = p => (p==="paper" ? "var(--blu)" : p==="blue" ? "var(--paper)" : "var(--blu-bright)");

const frames = [
 {n:1, plate:"ink", arch:"Cover", focal:"Design an experiment that can come back no.",
  body:[{copy:"kicker · M2 / VALIDATION DESIGN"},{copy:"hero"},{copy:"sub"},{dia:"motif", l:"validation motif · small, corner"}]},

 {n:2, plate:"paper", arch:"Statement · Tell", focal:"Validation that sets out to confirm finds confirmation.",
  body:[{copy:"kicker · WHY BOTHER"},{copy:"the tell (one line)"}]},

 {n:3, plate:"ink", arch:"Worked-Frame", focal:"She says yes, and has dropped the same fix three times.",
  body:[{dia:"says vs does · same person", l:"STATED “yeah, definitely”  ↔  DONE: airplane mode / screen-time app / phone in kitchen, all dropped · NO temperament label"}]},

 {n:4, plate:"ink", arch:"Prompt", focal:"Predict her answer to this leading question.", badge:{k:"do",t:"DO · 90s predict"},
  body:[{copy:"the leading question"},{dia:"team call", l:"the room says “yes” · that is the worthless signal"}]},

 {n:5, plate:"ink", arch:"Before / After", focal:"The difference is the question. Not the person.",
  body:[{dia:"two questions, one Anya", l:"LEADING “would a tool that silences the feed help?” → “yeah”  |  BEHAVIOUR “walk me through last night” → kitchen at 10, back at 11:40 · INDICTMENT: same person, same day, only the question changed"}]},

 {n:6, plate:"paper", arch:"Section · 2 rules", focal:"Two standing rules.",
  body:[{dia:"2-up rules", l:"① NEVER NAME YOUR PRODUCT (ask their behaviour, not your idea)  |  ② ASK ABOUT THE PAST, NOT THE FUTURE (what did you do, not what would you do)"}]},

 {n:7, plate:"paper", arch:"Formula", focal:"We believe / currently / because / wrong if.",
  body:[{dia:"hypothesis + falsification", l:"We believe ___ · currently ___ · because ___ · WE ARE WRONG IF ___  (the wrong-if line is filled FIRST)"}]},

 {n:8, plate:"blue", arch:"Divider · Your turn", focal:"Your turn: falsify, draft, debias, tier, dry-run.",
  body:[{dia:"5-node stage flow", l:"FALSIFY (12m · do first) → DRAFT (20m · hard stop) → DEBIAS (30m · largest) → TIER+CRITERIA (10m) → DRY-RUN (12m) · order is load-bearing"}]},

 {n:9, plate:"paper", arch:"Activity Card", focal:"Name what would prove you wrong. First.",
  body:[{dia:"falsification line · per assumption", l:"if you cannot name the disconfirming signal, the experiment is theatre"}]},

 {n:10, plate:"paper", arch:"Activity Card", focal:"The AI drafts. It will fish for yes.",
  body:[{dia:"protocol draft · suspect, not finished", l:"3 hypotheses · expect leading questions · that is what you fix next (not done yet)"},{copy:"hard stop · stop drafting, start breaking"}]},

 {n:11, plate:"paper", arch:"Activity Card", focal:"Break the questions. The spine.",
  body:[{dia:"3 debias ops · vs YOUR draft", l:"strip the product · flip future → past · intention → behaviour · checked against the falsification line"},{copy:"checkpoint · every question could return no"}]},

 {n:12, plate:"paper", arch:"Activity Card · Formula", focal:"Lock what counts as signal. Before you hear it.",
  body:[{dia:"tier + criteria", l:"validated / invalidated lines · set before the conversation so you cannot move the goalposts"}]},

 {n:13, plate:"paper", arch:"Activity Card", focal:"Rehearse before the field.", badge:{k:"prop",t:"PROPOSED"},
  body:[{dia:"dry-run + Shared Field Kit", l:"practise the opening question on a peer · peer flags any “fishes for yes” · best questions → shared kit · catch it here, not in the field"}]},

 {n:14, plate:"paper", arch:"Stats · Recap", focal:"Can your experiment come back no?",
  body:[{dia:"3-up stats", l:"a disconfirming signal · debiased questions · locked criteria  ·  good vs lazy: can-return-no vs a survey that was always going to say yes"}]},

 {n:15, plate:"ink", arch:"Handoff", focal:"Real behaviour decides. This afternoon.",
  body:[{dia:"forward pair", l:"OUT IN MARKET #1 · run it, gather real behaviour  |  feeds the PRD + M3 First Moves · a hollow yes is not signal"}]},
];

const accentName = "blue";
const deck = document.getElementById("deck");

frames.forEach((f)=>{
  const el = document.createElement("section");
  el.className = "frame "+f.plate;
  el.style.setProperty("--ax", A(f.plate));
  const badge = f.badge ? `<span class="badge ${f.badge.k}">${f.badge.t}</span> ` : "";
  let body = "";
  for(const b of f.body){
    if(b.copy){ body += `<div class="copyslot">▢ ${b.copy} — copy (voice pass)</div>`; }
    else { body += `<div class="diagram"><div class="dtype">${b.dia}</div><div class="dlabels">${b.l}</div></div>`; }
  }
  const plateLabel = f.plate==="blue" ? "blue (divider)" : f.plate;
  el.innerHTML = `
    <div class="f-top"><span class="f-num">${String(f.n).padStart(2,"0")}</span><span class="f-arch">${f.arch}</span></div>
    <div class="f-focal">${badge}${f.focal}</div>
    <div class="f-body">${body}</div>
    <div class="f-foot">
      <span><span class="dot" style="background:${A(f.plate)}"></span>plate: ${plateLabel} · accent: ${accentName}</span>
      <span>HLV · ${f.n} / 15</span>
    </div>`;
  deck.appendChild(el);
});

const body=document.body, modeBtn=document.getElementById("mode"),
      countEl=document.getElementById("count"), hintEl=document.getElementById("hint"),
      els=[...document.querySelectorAll(".frame")];
let stepMode=false, cur=0;
function setCurrent(i){
  cur=Math.max(0,Math.min(frames.length-1,i));
  els.forEach((e,k)=>e.classList.toggle("current",k===cur));
  if(stepMode){ countEl.textContent=(cur+1)+" / 15"; els[cur].scrollIntoView({block:"center"}); }
}
modeBtn.addEventListener("click",()=>{
  stepMode=!stepMode;
  body.classList.toggle("step",stepMode); body.classList.toggle("scroll",!stepMode);
  modeBtn.textContent=stepMode?"step":"scroll"; modeBtn.classList.toggle("on",stepMode);
  hintEl.textContent=stepMode?"step mode · ← → arrows or swipe · tap “step” to return to scroll":"135-min session · scroll all 15 · tap “scroll” to step (arrows / swipe)";
  if(stepMode) setCurrent(cur); else countEl.textContent="15 frames";
});
document.addEventListener("keydown",e=>{
  if(!stepMode) return;
  if(e.key==="ArrowRight"||e.key==="ArrowDown"){ setCurrent(cur+1); e.preventDefault(); }
  if(e.key==="ArrowLeft"||e.key==="ArrowUp"){ setCurrent(cur-1); e.preventDefault(); }
});
let tsX=0,tsY=0;
document.addEventListener("touchstart",e=>{tsX=e.changedTouches[0].clientX;tsY=e.changedTouches[0].clientY;},{passive:true});
document.addEventListener("touchend",e=>{
  if(!stepMode) return;
  const dx=e.changedTouches[0].clientX-tsX, dy=e.changedTouches[0].clientY-tsY;
  if(Math.abs(dx)>45 && Math.abs(dx)>Math.abs(dy)){ setCurrent(cur+(dx<0?1:-1)); }
},{passive:true});
</script>
</body>
</html>
