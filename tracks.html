<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>HLV — The three specialty tracks</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --WHITE:#FFFFFF; --L92:#E4E4E4; --MUTE:#939393; --SEC:#666666; --MUTE2:#565656; --INK:#1E1E1E;
    --GRN:#00D967; --GRNd:#0A8C3D; --BLU:#1E9BFE; --BLUd:#0B5FB0; --PUR:#B884FE; --PURd:#7649C2;
    --YEL:#FFC21A; --RED:#FF6B6B; --REDd:#C2342B;
    --GRN-soft:#E7FBF0; --BLU-soft:#E9F4FF; --PUR-soft:#F3ECFF; --YEL-soft:#FFF6DC;
    --plate-paper:#FAFAF7; --plate-ink:#11121A;
    --disp:"Plus Jakarta Sans",system-ui,sans-serif; --mono:"JetBrains Mono",ui-monospace,Menlo,monospace;
    --acc:var(--GRN); --accd:var(--GRNd); --accsoft:var(--GRN-soft);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:#0a0b0e;color:var(--INK);font-family:var(--disp);-webkit-text-size-adjust:100%}
  .bar{position:fixed;top:0;left:0;right:0;height:34px;z-index:20;background:#0a0b0e;color:#cfcfd4;display:flex;align-items:center;gap:.7rem;padding:0 .8rem;font:600 11px/1 var(--mono)}
  .bar .t{flex:1;letter-spacing:.06em;color:#85868c}
  .bar .ct{color:var(--GRN)}
  .bar button{font:600 10px/1 var(--mono);color:#cfcfd4;background:#1a1c22;border:1px solid #2c2f38;border-radius:5px;padding:.38rem .55rem;cursor:pointer}
  .bar button.on{background:var(--GRNd);border-color:var(--GRNd);color:#fff}
  #deck{padding:34px 0 0}
  .slide{width:min(100vw, calc((100vh - 34px) * 16 / 9));aspect-ratio:16/9;margin:0 auto;position:relative;overflow:hidden;background:var(--plate-paper);color:var(--INK);container-type:inline-size;display:flex;flex-direction:column;padding:6cqw 6.5cqw 4.6cqw}
  .slide.ink{background:var(--plate-ink);color:#F2F2F0}
  .slide.acc-b{--acc:var(--BLU);--accd:var(--BLUd);--accsoft:var(--BLU-soft)}
  .slide.acc-p{--acc:var(--PUR);--accd:var(--PURd);--accsoft:var(--PUR-soft)}
  body.scroll .slide{margin-bottom:14px;box-shadow:0 3px 22px rgba(0,0,0,.4)}
  body.step #deck{height:calc(100vh - 34px);display:flex;align-items:center}
  body.step .slide{display:none;box-shadow:0 0 40px rgba(0,0,0,.5)}
  body.step .slide.cur{display:flex}

  .kick{font:700 2.5cqw/1.2 var(--mono);letter-spacing:.12em;text-transform:uppercase;color:var(--accd)}
  .slide:not(.acc-b):not(.acc-p) .kick.neutral,.kick.neutral{color:var(--MUTE2)}
  .ink .kick{color:#9fa0a8}
  .h1{font:800 6.1cqw/1.05 var(--disp);letter-spacing:-.015em;margin:.7cqw 0 1.2cqw;max-width:25ch}
  .hero{font:800 8.6cqw/1.02 var(--disp);letter-spacing:-.02em;margin:1cqw 0}
  .sub{font:500 3.4cqw/1.42 var(--disp);color:var(--SEC);max-width:36ch} .ink .sub{color:#b9b9c0}
  .body{font:400 3cqw/1.5 var(--disp);color:var(--MUTE2);max-width:52ch}
  .grow{flex:1;display:flex;flex-direction:column;justify-content:center}
  .foot{display:flex;justify-content:space-between;align-items:flex-end;font:600 2.1cqw/1 var(--mono);color:var(--MUTE);margin-top:auto;padding-top:2cqw} .ink .foot{color:#7a7b84}

  .rows{display:flex;flex-direction:column;gap:1.6cqw;margin-top:2.2cqw}
  .trk{display:flex;align-items:baseline;gap:1.6cqw;border-left:.5cqw solid;padding-left:1.8cqw}
  .trk .nm{font:800 4.2cqw/1 var(--disp);min-width:17cqw} .trk .ds{font:500 3.1cqw/1.3 var(--disp);color:var(--SEC)}
  .t-b{border-color:var(--BLU)} .t-b .nm{color:var(--BLUd)}
  .t-p{border-color:var(--PUR)} .t-p .nm{color:var(--PURd)}
  .t-g{border-color:var(--GRN)} .t-g .nm{color:var(--GRNd)}

  .cards{display:flex;gap:1.6cqw;margin-top:2.2cqw}
  .card{flex:1;border-radius:.8cqw;padding:2.2cqw 2cqw;border:.2cqw solid var(--acc);background:#fff;display:flex;flex-direction:column}
  .card .n{font:700 2.15cqw/1 var(--mono);color:var(--MUTE);letter-spacing:.05em;margin-bottom:.7cqw}
  .card .ti{font:800 3.5cqw/1.08 var(--disp);color:var(--accd);margin-bottom:1cqw}
  .card .ds{font:500 2.6cqw/1.32 var(--disp);color:var(--SEC);flex:1}
  .card .pr{font:600 2.35cqw/1.25 var(--mono);color:var(--INK);margin-top:1.4cqw;border-top:.15cqw solid var(--L92);padding-top:1cqw}

  .do-list{margin-top:2.2cqw;display:flex;flex-direction:column;gap:1.5cqw}
  .di{display:flex;gap:1.6cqw;align-items:flex-start}
  .di .ix{font:800 3.4cqw/1 var(--mono);color:var(--accd);min-width:4cqw}
  .di .tx{font:500 3.1cqw/1.36 var(--disp);color:var(--INK);max-width:48ch} .di .tx b{font-weight:800}
  .out{margin-top:auto;background:var(--accsoft);border:.2cqw solid var(--acc);border-radius:.8cqw;padding:1.8cqw 2cqw;font:600 2.9cqw/1.35 var(--disp);color:var(--accd)}
  .out .lab{font:700 2.15cqw/1 var(--mono);letter-spacing:.06em;color:var(--accd);display:block;margin-bottom:.7cqw;opacity:.85}

  .mm{display:flex;gap:.5cqw;margin-top:2.4cqw;height:12cqw}
  .blk{border-radius:.5cqw;padding:1.1cqw .85cqw;display:flex;flex-direction:column;justify-content:space-between;font:700 2cqw/1.12 var(--mono);overflow:hidden}
  .blk small{font:600 1.65cqw/1.05 var(--mono);opacity:.82}
  .blk.rcv{background:#d7d8dd;color:#33343a}
  .blk.do{background:var(--accd);color:#fff}
  .blk.main{background:var(--acc);color:#06270f;outline:.35cqw solid var(--accd)}
  .legend{display:flex;gap:2.6cqw;margin-top:1.5cqw;font:600 2.3cqw/1 var(--mono);color:var(--MUTE2)}
  .legend i{display:inline-block;width:2.2cqw;height:1.3cqw;border-radius:.3cqw;vertical-align:-.1cqw;margin-right:.6cqw}

  .two{display:flex;gap:2.2cqw;margin-top:2.4cqw}
  .pane{flex:1;border-radius:.9cqw;padding:2.2cqw 2.3cqw;border:.2cqw solid}
  .pane .pl{font:700 2.5cqw/1 var(--mono);letter-spacing:.05em;margin-bottom:1.2cqw}
  .pane .pt{font:500 2.95cqw/1.36 var(--disp)}
  .pane.ai{border-color:var(--L92);background:#fff} .pane.ai .pl{color:var(--MUTE2)}
  .pane.stu{border-color:var(--GRN);background:var(--GRN-soft)} .pane.stu .pl{color:var(--GRNd)}

  .tl{margin-top:2.4cqw;border-left:.3cqw solid var(--L92);padding-left:2.2cqw;display:flex;flex-direction:column;gap:1.3cqw}
  .ev{position:relative}
  .ev::before{content:"";position:absolute;left:-2.83cqw;top:.55cqw;width:1.3cqw;height:1.3cqw;border-radius:50%;background:var(--GRNd)}
  .ev .d{font:700 2.1cqw/1 var(--mono);color:var(--MUTE);letter-spacing:.04em} .ev .x{font:600 2.9cqw/1.25 var(--disp)} .ev .x b{font-weight:800}

  .conv{display:flex;align-items:center;justify-content:center;gap:1.5cqw;margin-top:2cqw}
  .cn{border-radius:.8cqw;padding:1.7cqw 1.9cqw;border:.22cqw solid;background:#fff;text-align:center;min-width:21cqw}
  .cn b{font:800 3.2cqw/1.05 var(--disp);display:block} .cn span{font:600 2.1cqw/1.2 var(--mono);color:var(--MUTE2)}
  .cn.bz{border-color:var(--GRN)} .cn.bz b{color:var(--GRNd)} .cn.mz{border-color:var(--BLU)} .cn.mz b{color:var(--BLUd)}
  .cn.join{border-color:var(--INK);background:var(--INK);color:#fff} .cn.join b{color:#fff} .cn.join span{color:#bdbdc4}
  .op{font:800 4cqw/1 var(--disp);color:var(--MUTE)}

  .cols{display:flex;gap:2.2cqw;margin-top:1.8cqw}
  .col{flex:1;border-radius:.8cqw;padding:2.1cqw 2.3cqw;border:.2cqw solid}
  .col.dec{border-color:var(--GRN);background:var(--GRN-soft)} .col.opn{border-color:var(--YEL);background:var(--YEL-soft)}
  .col .ch{font:700 2.5cqw/1 var(--mono);letter-spacing:.05em;margin-bottom:1.2cqw}
  .col.dec .ch{color:var(--GRNd)} .col.opn .ch{color:#8a6000}
  .col ul{list-style:none} .col li{font:500 2.65cqw/1.3 var(--disp);padding:.6cqw 0 .6cqw 2.4cqw;position:relative;color:var(--SEC)}
  .col li::before{content:"";position:absolute;left:0;top:1.5cqw;width:1cqw;height:1cqw;border-radius:50%}
  .col.dec li::before{background:var(--GRN)} .col.opn li::before{background:var(--YEL)}

  .note3{margin-top:2.2cqw;display:flex;flex-direction:column;gap:1.2cqw}
  .n3{display:flex;gap:1.4cqw;align-items:baseline}
  .n3 .nl{font:800 3cqw/1 var(--disp);min-width:16cqw} .n3 .nt{font:500 2.85cqw/1.3 var(--disp);color:var(--SEC)}
  .n3.b .nl{color:var(--BLUd)} .n3.p .nl{color:var(--PURd)} .n3.g .nl{color:var(--GRNd)}

  /* arcs-flat */
  .arcs{display:flex;flex-direction:column;gap:1.4cqw;margin-top:2cqw}
  .ar{display:flex;align-items:center;gap:1cqw}
  .al{width:15cqw;font:800 3.1cqw/1 var(--disp)}
  .ac{flex:1;border-radius:.6cqw;padding:1.3cqw 1.3cqw;border:.18cqw solid;background:#fff;text-align:center}
  .ac b{font:700 2.7cqw/1.1 var(--disp);display:block;color:var(--INK)} .ac span{font:600 2cqw/1.1 var(--mono);color:var(--MUTE)}
  .amid{font:700 2.8cqw/1 var(--mono);color:var(--MUTE)}
  .ar.b .al{color:var(--BLUd)} .ar.b .ac{border-color:var(--BLU)} .ar.p .al{color:var(--PURd)} .ar.p .ac{border-color:var(--PUR)} .ar.g .al{color:var(--GRNd)} .ar.g .ac{border-color:var(--GRN)}
</style>
</head>
<body class="step">
<div class="bar"><span class="t">HLV · THE THREE SPECIALTY TRACKS</span><span class="ct" id="ct">1 / 22</span><button id="mode" class="on">step</button></div>
<div id="deck"></div>
<script>
const S=[
// 1 cover
`<section class="slide ink"><div class="kick neutral">Hudson Lab Ventures · internal</div>
 <div class="grow"><div class="hero">The three<br>specialty tracks.</div><div class="sub">What they are, and how they run. A walkthrough for Cate and Stacey.</div></div>
 <div class="foot"><span>Hudson Lab Ventures</span><span>01 / 22</span></div></section>`,
// 2 split
`<section class="slide"><div class="kick neutral">Week 2</div><div class="h1">Each team splits into three specialists.</div>
 <div class="rows">
   <div class="trk t-b"><span class="nm">Market</span><span class="ds">Figures out who the customer is, and whether the need is real.</span></div>
   <div class="trk t-p"><span class="nm">Product</span><span class="ds">Defines the thing and builds it.</span></div>
   <div class="trk t-g"><span class="nm">Business</span><span class="ds">Works out whether it can make money.</span></div>
 </div>
 <div class="body" style="margin-top:2.4cqw">One person on each team takes each job. They work apart, then bring it back together. Each track runs three sessions across the week.</div>
 <div class="foot"><span>Hudson Lab Ventures</span><span>02 / 22</span></div></section>`,
// 3 business overview
`<section class="slide"><div class="kick">The Business track · makes money work</div><div class="h1">The Business track runs in three sessions.</div>
 <div class="cards">
   <div class="card"><div class="n">SESSION 1 · 105 MIN</div><div class="ti">Canvas Lite</div><div class="ds">Who pays, what for, how much, and whether the price holds up.</div><div class="pr">A one-line revenue statement</div></div>
   <div class="card"><div class="n">SESSION 2 · 135 MIN</div><div class="ti">Napkin Economics</div><div class="ds">Whether a single customer makes money once every cost is in.</div><div class="pr">The unit economics + the one risk</div></div>
   <div class="card"><div class="n">SESSION 3 · 105 MIN</div><div class="ti">The 100-Day Plan</div><div class="ds">What the first hundred days would actually look like.</div><div class="pr">A sequenced plan + budget</div></div>
 </div>
 <div class="foot"><span>Hudson Lab Ventures</span><span>03 / 22</span></div></section>`,
// 4 B1
`<section class="slide"><div class="kick">Business · Session 1 · Canvas Lite · 105 min</div><div class="h1">Who pays, and can you defend the price?</div>
 <div class="do-list">
   <div class="di"><span class="ix">01</span><span class="tx">Fill a simple canvas: <b>who pays, what for, how much, how often.</b> The AI suggests a pricing pattern to start from.</span></div>
   <div class="di"><span class="ix">02</span><span class="tx">Check the three things teams get wrong: is the payer actually the user (often a parent or an employer), can you <b>defend the price against one real number,</b> and what is the <b>trap</b> this kind of model always has.</span></div>
 </div>
 <div class="out"><span class="lab">What they leave with</span>A one-line revenue statement (who pays, how much, how often, for what), with the price defended and the trap named.</div>
 <div class="foot"><span>Hudson Lab Ventures</span><span>04 / 22</span></div></section>`,
// 5 B2
`<section class="slide"><div class="kick">Business · Session 2 · Napkin Economics · 135 min</div><div class="h1">Does one customer actually make money?</div>
 <div class="do-list">
   <div class="di"><span class="ix">01</span><span class="tx">Work out the money for <b>one customer in one month.</b> The AI gives quick, optimistic numbers.</span></div>
   <div class="di"><span class="ix">02</span><span class="tx">Put <b>every cost back in,</b> including the cost of getting that customer, which the AI tends to leave out. Then find <b>the one number that, if wrong, breaks the whole model.</b></span></div>
 </div>
 <div class="out"><span class="lab">What they leave with</span>The unit economics, the break-even point, and the named risk. For a sleep tool aimed at teens, the risk is whether they keep using it. A sponsor reviews the math on Wednesday.</div>
 <div class="foot"><span>Hudson Lab Ventures</span><span>05 / 22</span></div></section>`,
// 6 B3
`<section class="slide"><div class="kick">Business · Session 3 · The 100-Day Plan · 105 min</div><div class="h1">What would the first 100 days look like?</div>
 <div class="do-list">
   <div class="di"><span class="ix">01</span><span class="tx">The business and market specialists <b>come back together</b> and turn the week's work into a plan, split into <b>validate, build, and grow.</b></span></div>
   <div class="di"><span class="ix">02</span><span class="tx">Each part gets a goal, a few <b>concrete actions they could start on Monday,</b> and one number to watch. Anything they could not credibly start is cut.</span></div>
 </div>
 <div class="out"><span class="lab">What they leave with</span>A sequenced 100-day plan with a budget and a day-100 scorecard.</div>
 <div class="foot"><span>Hudson Lab Ventures</span><span>06 / 22</span></div></section>`,
// 7 minute map (B1)
`<section class="slide"><div class="kick">Inside Session 1 · Canvas Lite · 105 min</div><div class="h1">Inside one session, minute by minute.</div>
 <div class="mm">
   <div class="blk rcv" style="flex:19">Short teach<small>why it matters, with a worked example</small></div>
   <div class="blk do" style="flex:12">Compare notes<small>with other teams' business specialists</small></div>
   <div class="blk do" style="flex:12">Fill the canvas<small>with your team</small></div>
   <div class="blk main" style="flex:20">Pull it apart<small>payer · price · trap</small></div>
   <div class="blk do" style="flex:8">Write it<small>the statement</small></div>
   <div class="blk rcv" style="flex:5">Recap</div>
 </div>
 <div class="legend"><span><i style="background:#d7d8dd"></i>teacher talking</span><span><i style="background:var(--GRNd)"></i>students working</span><span><i style="background:var(--GRN)"></i>the main block</span></div>
 <div class="body" style="margin-top:1.8cqw;max-width:64ch">Most of the time is students doing, not listening. The teach is short and up front; the longest block is the team pulling its own model apart. Every session across the three tracks follows this shape.</div>
 <div class="foot"><span>Hudson Lab Ventures</span><span>07 / 22</span></div></section>`,
// 8 market overview
`<section class="slide acc-b"><div class="kick">The Market track · finds the customer</div><div class="h1">The Market track runs in three sessions.</div>
 <div class="cards">
   <div class="card"><div class="n">SESSION 1 · 105 MIN</div><div class="ti">Landscape Map</div><div class="ds">How the problem is solved today, and where the gap is.</div><div class="pr">A map of the field + the riskiest assumption</div></div>
   <div class="card"><div class="n">SESSION 2 · 135 MIN</div><div class="ti">Validation Design</div><div class="ds">Interviews that can prove the idea wrong, not just confirm it.</div><div class="pr">An interview plan ready to run</div></div>
   <div class="card"><div class="n">SESSION 3 · part of Wed</div><div class="ti">First Moves</div><div class="ds">The first ways to reach customers, and the first hundred users.</div><div class="pr">First channels + a path to 100 users</div></div>
 </div>
 <div class="foot"><span>Hudson Lab Ventures</span><span>08 / 22</span></div></section>`,
// 9 M1
`<section class="slide acc-b"><div class="kick">Market · Session 1 · Landscape Map · 105 min</div><div class="h1">How is the problem solved today, and where is the gap?</div>
 <div class="do-list">
   <div class="di"><span class="ix">01</span><span class="tx">List what already solves this problem, in three layers: <b>direct competitors, indirect substitutes, and the do-it-yourself workarounds</b> people cobble together.</span></div>
   <div class="di"><span class="ix">02</span><span class="tx">Place them on a simple grid to see the <b>empty space nobody fills,</b> then name the <b>riskiest thing you are assuming</b> about it.</span></div>
 </div>
 <div class="out"><span class="lab">What they leave with</span>A map of the field and the single riskiest assumption to test.</div>
 <div class="foot"><span>Hudson Lab Ventures</span><span>09 / 22</span></div></section>`,
// 10 M2
`<section class="slide acc-b"><div class="kick">Market · Session 2 · Validation Design · 135 min</div><div class="h1">How do you ask without leading the witness?</div>
 <div class="do-list">
   <div class="di"><span class="ix">01</span><span class="tx">Turn the riskiest assumption into interview questions that can come back no. Two rules: <b>never mention your product,</b> and <b>ask what people actually did,</b> not what they say they would do.</span></div>
   <div class="di"><span class="ix">02</span><span class="tx">Decide in advance <b>what would count as a real signal,</b> so a polite yes does not get mistaken for proof.</span></div>
 </div>
 <div class="out"><span class="lab">What they leave with</span>An interview plan they can run that same afternoon, out in the market.</div>
 <div class="foot"><span>Hudson Lab Ventures</span><span>10 / 22</span></div></section>`,
// 11 M3
`<section class="slide acc-b"><div class="kick">Market · Session 3 · First Moves · part of Wednesday</div><div class="h1">How do you reach the first hundred customers?</div>
 <div class="do-list">
   <div class="di"><span class="ix">01</span><span class="tx">List the ways you could reach customers and <b>score each by how many it reaches and how much effort it takes.</b></span></div>
   <div class="di"><span class="ix">02</span><span class="tx">Pick the first few and <b>sequence the first hundred users</b> over the early weeks.</span></div>
 </div>
 <div class="out"><span class="lab">What they leave with</span>The first channels and a concrete path to the first hundred users. This joins the business plan on Wednesday.</div>
 <div class="foot"><span>Hudson Lab Ventures</span><span>11 / 22</span></div></section>`,
// 12 product overview
`<section class="slide acc-p"><div class="kick">The Product track · builds the thing</div><div class="h1">The Product track runs in three sessions.</div>
 <div class="cards">
   <div class="card"><div class="n">SESSION 1 · 105 MIN</div><div class="ti">Solution Blueprint</div><div class="ds">The user's experience, and the one moment that matters most.</div><div class="pr">A blueprint + a one-line product description</div></div>
   <div class="card"><div class="n">SESSION 2 · 135 MIN</div><div class="ti">Product Definition</div><div class="ds">What the product is, and what goes in the first version.</div><div class="pr">A scoped first version</div></div>
   <div class="card"><div class="n">SESSION 3 · 105 MIN</div><div class="ti">Prototype Build</div><div class="ds">A rough working version, tested on real people.</div><div class="pr">A tested prototype</div></div>
 </div>
 <div class="foot"><span>Hudson Lab Ventures</span><span>12 / 22</span></div></section>`,
// 13 P1
`<section class="slide acc-p"><div class="kick">Product · Session 1 · Solution Blueprint · 105 min</div><div class="h1">What is the one moment the product has to get right?</div>
 <div class="do-list">
   <div class="di"><span class="ix">01</span><span class="tx">Sketch the user's experience as <b>a sequence of moments,</b> step by step.</span></div>
   <div class="di"><span class="ix">02</span><span class="tx">Find the <b>one moment the product lives or dies on,</b> and write what the product is in a single sentence.</span></div>
 </div>
 <div class="out"><span class="lab">What they leave with</span>A blueprint of the experience with the key moment marked, and a one-line product description.</div>
 <div class="foot"><span>Hudson Lab Ventures</span><span>13 / 22</span></div></section>`,
// 14 P2
`<section class="slide acc-p"><div class="kick">Product · Session 2 · Product Definition · 135 min</div><div class="h1">What is in the first version, and what waits?</div>
 <div class="do-list">
   <div class="di"><span class="ix">01</span><span class="tx">Define what the product is, and pick the <b>one feature worth telling a friend about.</b></span></div>
   <div class="di"><span class="ix">02</span><span class="tx">Draw the line between <b>what is in the first version and what waits,</b> and name the biggest thing you are assuming.</span></div>
